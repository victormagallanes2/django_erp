<!-- templates/admin/base_site.html -->
{% extends "admin/base_site.html" %}
{% load static %}

{% block extrahead %}
    {{ block.super }}
    
    <!-- ❌ ELIMINAR O COMENTAR ESTA LÍNEA -->
    <!-- <script src="{% static 'admin/js/offline_manager.js' %}"></script> -->
    
    <script>
        window.ERP_CONFIG = {{ ERP_CONFIG|safe }};
        console.log("🔴 ERP_CONFIG cargado globalmente:", window.ERP_CONFIG);
    </script>

    <!-- ✅ Estilos para ocultar elementos offline -->
    <style>
        /* Ocultar todos los elementos de la interfaz offline */
        #offline-badge, 
        #sync-button-header, 
        #force-offline-btn, 
        #force-online-btn,
        .connection-indicator,
        #connection-status-container,
        #offline-banner,
        .offline-toast {
            display: none !important;
        }
    </style>
{% endblock %}

{% block branding %}
    <div id="site-name">
        <a href="{% url 'admin:index' %}">
            {{ site_header|default:_('Django administration') }}
        </a>
    </div>
{% endblock %}

{% block content %}
    {{ block.super }}
{% endblock %}
